    <style>
      html, body, #root { background: transparent; }
      #fatal-error { position: fixed; inset: 0; z-index: 9999; padding: 24px;
        background: #fbf6ec; color: #1a1612; font-family: ui-monospace, Menlo, monospace;
        font-size: 13px; line-height: 1.5; overflow: auto; display: none; }
      #fatal-error.show { display: block; }
      #fatal-error h2 { font-family: Georgia, serif; font-size: 22px; margin-bottom: 12px; color: #7c2d29; }
      #fatal-error pre { white-space: pre-wrap; word-break: break-word;
        background: #f0e8d6; padding: 12px; border-radius: 8px; margin: 8px 0; }
      #fatal-error button { background: #1a1612; color: #fbf6ec; border: 0;
        padding: 10px 20px; border-radius: 999px; font-size: 12px; letter-spacing: 0.1em;
        text-transform: uppercase; cursor: pointer; margin-top: 12px; }
    </style>
    <script>
      // Catch any JS errors before / during React boot and surface them on screen.
      (function () {
        function show(msg) {
          var box = document.getElementById("fatal-error");
          if (!box) return;
          var pre = document.getElementById("fatal-error-msg");
          pre.textContent = (pre.textContent ? pre.textContent + "\n\n" : "") + msg;
          box.classList.add("show");
        }
        window.__SHOW_FATAL = show;
        window.addEventListener("error", function (e) {
          show("Error: " + (e.message || e.error?.message || "(unknown)") +
               (e.filename ? "\nFile: " + e.filename + ":" + e.lineno + ":" + e.colno : ""));
        });
        window.addEventListener("unhandledrejection", function (e) {
          show("Unhandled promise rejection: " + (e.reason?.message || e.reason || "(unknown)"));
        });
      })();
    </script>

    <div id="root">
      <div id="boot-fallback" style="font-family: Georgia, serif; padding: 48px 24px; max-width: 560px; margin: 0 auto; text-align: center; color: #1a1612;">
        <div style="font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.5;">Loading</div>
        <div style="font-size: 28px; margin-top: 12px;">Atrium is booting…</div>
        <div style="font-size: 13px; margin-top: 16px; opacity: 0.6; font-family: ui-monospace, Menlo, monospace;">
          If this message persists for more than 10 seconds, something failed to load.
          <br />Check that your network can reach unpkg.com, jsdelivr.net, and tailwindcss.com.
        </div>
      </div>
    </div>
    <div id="fatal-error">
      <h2>Atrium failed to start</h2>
      <pre id="fatal-error-msg"></pre>
      <button onclick="document.getElementById('fatal-error').classList.remove('show')">Dismiss</button>
    </div>
    <script>
      // If React hasn't replaced the boot fallback after 10 seconds, surface the issue.
      setTimeout(function () {
        if (document.getElementById("boot-fallback")) {
          window.__SHOW_FATAL("React did not mount within 10 seconds. " +
            "Likely a CDN was unreachable or the inlined script threw. " +
            "Available globals: " +
            "React=" + (typeof React) + ", " +
            "ReactDOM=" + (typeof ReactDOM) + ", " +
            "lucide=" + (typeof lucide) + ", " +
            "katex=" + (typeof katex) + ".");
        }
      }, 10000);
    </script>
